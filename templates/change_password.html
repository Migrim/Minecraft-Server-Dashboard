<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Minecraft Server · Change password</title>
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f6f1e8; --bg-soft:#ede5d4; --surface:#fdfaf3; --surface-2:#f8f2e4;
    --border:#e4dac4; --border-strong:#d3c4a4;
    --text:#2a221a; --text-2:#5a4e3e; --text-3:#8c806c; --text-4:#b3a994;
    --accent:#c2553d; --accent-hover:#ad4a35; --accent-soft:#f6e3da;
    --accent-fg-on:#fff8f3;
    --danger:#b3402c; --danger-soft:#f4dcd4;
    --shadow-sm: 0 1px 2px rgba(60,40,18,.05), 0 1px 1px rgba(60,40,18,.03);
    --shadow-lg: 0 30px 60px -30px rgba(60,30,15,.22), 0 12px 28px -16px rgba(60,30,15,.10);
    --shadow-md: 0 6px 24px -12px rgba(60,40,18,.12), 0 2px 4px rgba(60,40,18,.05);
  }
  [data-theme="dark"] {
    --bg:#1a1612; --bg-soft:#221d17; --surface:#211c16; --surface-2:#28221b;
    --border:#34291f; --border-strong:#483b2c;
    --text:#f1e9d8; --text-2:#c0b59c; --text-3:#8c806c; --text-4:#5f5544;
    --accent:#e08a6f; --accent-hover:#ea9a82; --accent-soft:#3a2418;
    --accent-fg-on:#2a1209;
    --danger:#e08a6f; --danger-soft:#3a2418;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
    --shadow-lg: 0 40px 80px -30px rgba(0,0,0,.7), 0 16px 32px -18px rgba(0,0,0,.5);
    --shadow-md: 0 8px 32px -14px rgba(0,0,0,.6), 0 2px 6px rgba(0,0,0,.3);
  }
  {% set accent = panel_accent_color|default('#c2553d') %}
  {% set accent_fg = panel_accent_fg|default('#fff8f3') %}
  :root {
    --accent:{{ accent }};
    --accent-hover:color-mix(in oklab, {{ accent }} 86%, #000);
    --accent-soft:color-mix(in oklab, {{ accent }} 15%, var(--surface));
    --accent-ink:color-mix(in oklab, {{ accent }} 50%, var(--text));
    --accent-fg-on:{{ accent_fg }};
  }
  [data-theme="dark"] {
    --accent:{{ accent }};
    --accent-hover:color-mix(in oklab, {{ accent }} 88%, #fff);
    --accent-soft:color-mix(in oklab, {{ accent }} 20%, var(--surface));
    --accent-ink:color-mix(in oklab, {{ accent }} 68%, #fff);
    --accent-fg-on:{{ accent_fg }};
  }

  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 14px; line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    transition: background .25s ease, color .25s ease;
  }

  .stage {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; transition: background .25s ease;
  }
  .stage::before {
    content: "";
    position: absolute; inset: 0; z-index: 0;
    background-image:
      radial-gradient(circle at 1px 1px, color-mix(in oklab, var(--text-4) 32%, transparent) 1px, transparent 0);
    background-size: 28px 28px;
    opacity: .35; pointer-events: none;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 30%, transparent 75%);
  }

  .canvas {
    width: 1920px; height: 1080px;
    flex: 0 0 auto; flex-shrink: 0; transform-origin: center center;
    position: relative; z-index: 1;
  }

  .terrain {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 1;
    height: 220px; pointer-events: none;
    opacity: .55; color: var(--border-strong);
  }
  [data-theme="dark"] .terrain { opacity: .45; }
  .terrain svg { width: 100%; height: 100%; display: block; }

  .corner {
    position: absolute; top: 32px; left: 40px; right: 40px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 3;
  }
  .brand { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 16px; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 9px;
    background: var(--accent); box-shadow: var(--shadow-sm);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--accent-fg-on);
  }
  .brand-mark svg { width: 18px; height: 18px; }
  .brand-name { letter-spacing: -.01em; }

  .corner-right { display: flex; align-items: center; gap: 10px; }
  .icon-btn {
    width: 38px; height: 38px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text-2); cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
  }
  .icon-btn:hover { background: var(--bg-soft); color: var(--text); border-color: var(--border-strong); }
  .icon-btn svg { width: 17px; height: 17px; }

  .center {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
  }
  .login {
    width: 460px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; box-shadow: var(--shadow-lg);
    padding: 44px 44px 36px;
    transform: scale(1.28);
  }

  .login h1 { margin: 0 0 8px; font-size: 26px; font-weight: 600; letter-spacing: -.02em; }
  .login .lede { margin: 0 0 28px; color: var(--text-3); font-size: 14px; }

  /* Sonner toasts */
  .toast-wrap { position:fixed; bottom:24px; right:24px; z-index:9000; width:360px; max-width:calc(100vw - 32px); display:flex; flex-direction:column; gap:10px; pointer-events:none; }
  .snr-toast { pointer-events:all; width:100%; display:flex; align-items:center; gap:10px; padding:11px 12px 11px 14px; background:var(--surface); border:1px solid var(--border); border-radius:13px; box-shadow:0 4px 18px -4px rgba(60,40,18,.14),0 2px 6px -2px rgba(60,40,18,.08); animation:snr-in .3s cubic-bezier(.21,1.02,.73,1) forwards; overflow:hidden; }
  [data-theme="dark"] .snr-toast { box-shadow:0 4px 22px -4px rgba(0,0,0,.55),0 2px 8px -2px rgba(0,0,0,.35); }
  .snr-toast.snr-out { animation:snr-out .3s ease forwards; }
  .snr-icon { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; flex-shrink:0; color:var(--text-3); }
  .snr-toast.err .snr-icon { color:#b3402c; }
  [data-theme="dark"] .snr-toast.err .snr-icon { color:#e08a6f; }
  .snr-icon svg { width:15px; height:15px; }
  .snr-body { flex:1; min-width:0; }
  .snr-title { font-weight:600; font-size:13px; color:var(--text); }
  .snr-close { border:0; background:transparent; color:var(--text-4); cursor:pointer; padding:3px; border-radius:6px; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; transition:color .12s; }
  .snr-close:hover { color:var(--text-2); }
  @keyframes snr-in  { from { transform:translateX(calc(100% + 32px)); opacity:0; } to { transform:translateX(0); opacity:1; } }
  @keyframes snr-out { from { transform:translateX(0); opacity:1; } to { transform:translateX(calc(100% + 32px)); opacity:0; } }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12.5px; color: var(--text-2); font-weight: 500; margin-bottom: 7px; }
  .field .input-wrap { position: relative; display: flex; align-items: center; }
  .field .input-wrap svg.lead {
    position: absolute; left: 14px; width: 16px; height: 16px;
    color: var(--text-3); pointer-events: none;
  }
  .field input {
    width: 100%; padding: 12px 44px 12px 42px;
    background: var(--bg-soft); border: 1px solid var(--border);
    border-radius: 10px; font: inherit; font-size: 14px; color: var(--text);
    font-family: 'JetBrains Mono', ui-monospace, monospace; letter-spacing: .04em;
    transition: border-color .15s, background .15s, box-shadow .15s;
  }
  .field input::placeholder { color: var(--text-4); }
  .field input:focus {
    outline: none; border-color: var(--accent); background: var(--surface);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent);
  }
  .field .reveal {
    position: absolute; right: 6px; width: 32px; height: 32px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: 0; border-radius: 8px;
    color: var(--text-3); cursor: pointer;
  }
  .field .reveal:hover { background: var(--bg-soft); color: var(--text-2); }
  .field .reveal svg { width: 16px; height: 16px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 13px 18px; border-radius: 11px;
    font: inherit; font-weight: 600; font-size: 14px;
    cursor: pointer; border: 1px solid transparent;
    transition: transform .05s, background .15s, border-color .15s, color .15s;
    width: 100%; margin-top: 8px;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--accent); color: var(--accent-fg-on);
    box-shadow: 0 1px 0 rgba(255,255,255,.16) inset, 0 1px 2px rgba(60,30,15,.18);
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary svg { width: 15px; height: 15px; }

  .footer {
    position: absolute; left: 0; right: 0; bottom: 24px;
    text-align: center; color: var(--text-3); font-size: 12px; z-index: 3;
  }
</style>
</head>
<body>

<div class="stage" id="stage">

  <div class="terrain" aria-hidden="true">
    <svg viewBox="0 0 1920 220" preserveAspectRatio="none">
      <g fill="currentColor" opacity=".5">
        <rect x="0"    y="80"  width="80" height="140"/>
        <rect x="80"   y="100" width="80" height="120"/>
        <rect x="160"  y="60"  width="80" height="160"/>
        <rect x="240"  y="90"  width="80" height="130"/>
        <rect x="320"  y="70"  width="80" height="150"/>
        <rect x="400"  y="110" width="80" height="110"/>
        <rect x="480"  y="80"  width="80" height="140"/>
        <rect x="560"  y="50"  width="80" height="170"/>
        <rect x="640"  y="90"  width="80" height="130"/>
        <rect x="720"  y="70"  width="80" height="150"/>
        <rect x="800"  y="40"  width="80" height="180"/>
        <rect x="880"  y="60"  width="80" height="160"/>
        <rect x="960"  y="90"  width="80" height="130"/>
        <rect x="1040" y="70"  width="80" height="150"/>
        <rect x="1120" y="100" width="80" height="120"/>
        <rect x="1200" y="60"  width="80" height="160"/>
        <rect x="1280" y="80"  width="80" height="140"/>
        <rect x="1360" y="50"  width="80" height="170"/>
        <rect x="1440" y="90"  width="80" height="130"/>
        <rect x="1520" y="70"  width="80" height="150"/>
        <rect x="1600" y="100" width="80" height="120"/>
        <rect x="1680" y="80"  width="80" height="140"/>
        <rect x="1760" y="60"  width="80" height="160"/>
        <rect x="1840" y="90"  width="80" height="130"/>
      </g>
      <g fill="currentColor">
        <rect x="-40"  y="150" width="80" height="80"/>
        <rect x="40"   y="130" width="80" height="100"/>
        <rect x="120"  y="160" width="80" height="80"/>
        <rect x="200"  y="140" width="80" height="100"/>
        <rect x="280"  y="170" width="80" height="80"/>
        <rect x="360"  y="150" width="80" height="80"/>
        <rect x="440"  y="130" width="80" height="100"/>
        <rect x="520"  y="160" width="80" height="80"/>
        <rect x="600"  y="120" width="80" height="110"/>
        <rect x="680"  y="150" width="80" height="80"/>
        <rect x="760"  y="170" width="80" height="80"/>
        <rect x="840"  y="140" width="80" height="100"/>
        <rect x="920"  y="120" width="80" height="110"/>
        <rect x="1000" y="150" width="80" height="80"/>
        <rect x="1080" y="170" width="80" height="80"/>
        <rect x="1160" y="140" width="80" height="100"/>
        <rect x="1240" y="160" width="80" height="80"/>
        <rect x="1320" y="130" width="80" height="100"/>
        <rect x="1400" y="150" width="80" height="80"/>
        <rect x="1480" y="170" width="80" height="80"/>
        <rect x="1560" y="140" width="80" height="100"/>
        <rect x="1640" y="160" width="80" height="80"/>
        <rect x="1720" y="130" width="80" height="100"/>
        <rect x="1800" y="150" width="80" height="80"/>
        <rect x="1880" y="170" width="80" height="80"/>
      </g>
    </svg>
  </div>

  <div class="corner">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2 3 7v10l9 5 9-5V7l-9-5z"/>
          <path d="M3 7l9 5 9-5"/>
          <path d="M12 12v10"/>
        </svg>
      </div>
      <span class="brand-name">Mc Panel</span>
    </div>
    <div class="corner-right">
      <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
      </button>
    </div>
  </div>

  <div class="canvas" id="canvas">
    <div class="center">
      <form class="login" method="post" action="/change-password" autocomplete="new-password">

        <h1>Change password</h1>
        <p class="lede">Choose a new password for your panel account.</p>

        <div class="field">
          <label for="password">New password</label>
          <div class="input-wrap">
            <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input id="password" name="password" type="password" placeholder="••••••••••••" minlength="4" autocomplete="new-password" required autofocus />
            <button type="button" class="reveal" data-target="password" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="password2">Confirm new password</label>
          <div class="input-wrap">
            <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input id="password2" name="password2" type="password" placeholder="••••••••••••" minlength="4" autocomplete="new-password" required />
            <button type="button" class="reveal" data-target="password2" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn btn-primary" type="submit">
          Save new password
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

      </form>
    </div>
  </div>

  <div class="footer">
    <span>© 2026 One-Auth.net</span>
  </div>

</div>

<div class="toast-wrap" id="toasts"></div>

<script>
  const root = document.documentElement;
  const tBtn = document.getElementById('theme-toggle');
  const tIco = document.getElementById('theme-icon');
  const SUN  = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
  const MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  const saved = localStorage.getItem('mc-theme');
  const initial = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  setTheme(initial);
  tBtn.addEventListener('click', () => setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
  function setTheme(t) {
    root.setAttribute('data-theme', t);
    localStorage.setItem('mc-theme', t);
    tIco.innerHTML = t === 'dark' ? SUN : MOON;
  }

  const EYE     = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>';
  const EYE_OFF = '<path d="M17.94 17.94A10.06 10.06 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12A3 3 0 1 1 9.88 9.88"/>';
  document.querySelectorAll('.reveal').forEach(btn => {
    btn.addEventListener('click', () => {
      const inp = document.getElementById(btn.dataset.target);
      const showing = inp.type === 'text';
      inp.type = showing ? 'password' : 'text';
      btn.querySelector('svg').innerHTML = showing ? EYE : EYE_OFF;
    });
  });

  {% if error %}
  (function() {
    const wrap = document.getElementById('toasts');
    const t = document.createElement('div');
    t.className = 'snr-toast err';
    t.innerHTML = '<span class="snr-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span><div class="snr-body"><div class="snr-title">{{ error }}</div></div><button class="snr-close" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
    wrap.appendChild(t);
    const timer = setTimeout(dismiss, 5000);
    t.querySelector('.snr-close').addEventListener('click', dismiss);
    function dismiss() { clearTimeout(timer); t.classList.add('snr-out'); setTimeout(() => t.remove(), 320); }
  })();
  {% endif %}

  const stage  = document.getElementById('stage');
  const canvas = document.getElementById('canvas');
  const CW = 1920, CH = 1080;
  function fit() {
    const s = Math.min(stage.clientWidth / CW, stage.clientHeight / CH);
    canvas.style.transform = `scale(${s})`;
  }
  fit();
  window.addEventListener('resize', fit);
</script>
</body>
</html>
